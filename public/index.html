<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="google" content="notranslate">
  <title>EcoRent USA | Rentals and Tenant Services</title>
  <meta name="description" content="Find available EcoRent USA rentals, view apartment details, explore the rental map, and submit maintenance requests online.">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="preload" as="image" href="/images/flags/us.png">
  <link rel="preload" as="image" href="/images/flags/es.png">
  <link rel="stylesheet" href="css/home_page.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>

  <div id="navbar"></div>

  <section class="hero">
    <img src="images/landscape.png" alt="EcoRent USA rental homes and neighborhood landscape" class="hero-img hero-desktop"/>
    <img src="images/landscape_mobile.png" alt="EcoRent USA rental homes and neighborhood landscape" class="hero-img hero-mobile"/>
    <div class="hero-shade"></div>
    <div class="hero-content">
      <p class="hero-kicker" data-i18n="home_kicker">EcoRent USA</p>
      <h1 data-i18n="home_headline">Find your next rental with less guesswork.</h1>
      <p class="hero-copy" data-i18n="home_subtext">Browse available units, compare details, and get tenant support from one simple place.</p>
      <div class="hero-actions">
        <a href="#units" class="hero-button primary">
          <span data-i18n="browse_rentals">Browse rentals</span>
          <i class="fas fa-arrow-down"></i>
        </a>
        <a href="maintenance.html" class="hero-button secondary">
          <span data-i18n="tenant_support">Tenant support</span>
          <i class="fas fa-screwdriver-wrench"></i>
        </a>
      </div>
    </div>
  </section>

  <section class="quick-actions" aria-label="EcoRent services">
    <a href="#units" class="quick-action">
      <i class="fas fa-building"></i>
      <span data-i18n="quick_available">Available rentals</span>
    </a>
    <a href="map.html" class="quick-action">
      <i class="fas fa-map-marked-alt"></i>
      <span data-i18n="quick_map">Map search</span>
    </a>
    <a href="maintenance.html" class="quick-action">
      <i class="fas fa-toolbox"></i>
      <span data-i18n="quick_maintenance">Maintenance requests</span>
    </a>
  </section>

  <section class="units" id="units">
    <div class="section-heading">
      <p data-i18n="rentals_kicker">Current listings</p>
      <h2 data-i18n="rentals_headline">Available rentals</h2>
    </div>
    <div class="units-grid" id="unitsGrid"></div>
  </section> 
 
  <div id="footer"></div>

  <script type="module" src="/js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script type="module" src="/js/home_page.js"></script>

</body>
</html>
